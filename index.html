<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transmisor — Live Shopping Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #a3e635; --bg: #0f172a; --accent: #22c55e; }
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); color: white; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh;
        }
        .card { 
            background: #1e293b; padding: 2.5rem; border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; 
            width: 90%; max-width: 420px; border: 1px solid rgba(255,255,255,0.1); 
        }
        .logo { font-size: 1.4rem; font-weight: 900; color: var(--primary); margin-bottom: 4px; }
        .subtitle { color: #64748b; font-size: 0.78rem; margin-bottom: 28px; letter-spacing: 1px; }
        input {
            width: 100%; padding: 0.9rem 1rem; margin-bottom: 12px;
            background: #0f172a; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: white; font-size: 0.95rem;
        }
        input:focus { outline: none; border-color: var(--primary); }
        .btn-primary {
            background: var(--primary); color: #064e3b; border: none; 
            padding: 1rem; border-radius: 14px; font-weight: 900; 
            font-size: 1rem; cursor: pointer; width: 100%; text-transform: uppercase;
            transition: 0.3s; margin-top: 4px;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(163,230,53,0.3); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .btn-primary.live { background: #ef4444; color: white; }
        .btn-secondary {
            margin-top: 10px; width: 100%; padding: 0.75rem;
            background: transparent; border: 1px solid rgba(163,230,53,0.3);
            color: var(--primary); border-radius: 12px; font-size: 0.8rem;
            font-weight: 700; cursor: pointer; letter-spacing: 1px;
        }
        .btn-link {
            background: none; border: none; color: #64748b; 
            font-size: 0.78rem; cursor: pointer; margin-top: 16px; text-decoration: underline;
        }
        .status-pill {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 16px; border-radius: 99px; background: rgba(0,0,0,0.3);
            margin-bottom: 18px; font-size: 0.72rem; font-weight: 700; letter-spacing: 1px;
        }
        #status-dot { width: 10px; height: 10px; background: #ef4444; border-radius: 50%; }
        #status-dot.online { background: var(--primary); box-shadow: 0 0 10px var(--primary); }
        .link-box { 
            margin-top: 20px; background: rgba(163,230,53,0.05); 
            border: 1px solid rgba(163,230,53,0.2); border-radius: 12px; padding: 14px;
            display: none; text-align: left;
        }
        .url-text { 
            font-family: monospace; font-size: 0.72rem; color: var(--primary); 
            word-break: break-all; display: block; margin-bottom: 10px;
        }
        .copy-btn {
            background: var(--primary); color: #064e3b; border: none;
            padding: 5px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; cursor: pointer;
        }
        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 99px;
            font-size: 0.65rem; font-weight: 800; letter-spacing: 1px; margin-bottom: 16px;
        }
        .badge.prueba { background: #f59e0b22; color: #f59e0b; border: 1px solid #f59e0b44; }
        .badge.junior  { background: #3b82f622; color: #3b82f6; border: 1px solid #3b82f644; }
        .badge.full    { background: #a3e63522; color: #a3e635; border: 1px solid #a3e63544; }
        .badge.master  { background: #a855f722; color: #a855f7; border: 1px solid #a855f744; }
        .msg-error { color: #f87171; font-size: 0.8rem; margin-top: 8px; }
        .vence-info { color: #64748b; font-size: 0.72rem; margin-bottom: 12px; }
        #screen-login, #screen-registro, #screen-panel { display: none; }
    </style>
</head>
<body>
<div class="card">

    <!-- LOGIN -->
    <div id="screen-login">
        <div class="logo">⚡ EASYLINK</div>
        <div class="subtitle">LIVE SHOPPING PRO</div>
        <input id="login-user" type="text" placeholder="Usuario" />
        <input id="login-pass" type="password" placeholder="Contraseña" />
        <button class="btn-primary" onclick="doLogin()">ENTRAR</button>
        <div id="login-error" class="msg-error"></div>
        <button class="btn-link" onclick="mostrar('registro')">¿No tienes cuenta? Regístrate gratis</button>
    </div>

    <!-- REGISTRO -->
    <div id="screen-registro">
        <div class="logo">⚡ EASYLINK</div>
        <div class="subtitle">CREAR CUENTA — 7 DÍAS GRATIS</div>
        <input id="reg-user" type="text" placeholder="Usuario" />
        <input id="reg-pass" type="password" placeholder="Contraseña" />
        <input id="reg-email" type="email" placeholder="Email" />
        <input id="reg-url" type="url" placeholder="Link de tu tienda (opcional)" />
        <button class="btn-primary" onclick="doRegistro()">CREAR CUENTA</button>
        <div id="reg-error" class="msg-error"></div>
        <button class="btn-link" onclick="mostrar('login')">¿Ya tienes cuenta? Inicia sesión</button>
    </div>

    <!-- PANEL TRANSMISOR -->
    <div id="screen-panel">
        <div class="status-pill">
            <div id="status-dot"></div>
            <span id="status-text">CONECTANDO...</span>
        </div>
        <div id="plan-badge" class="badge"></div>
        <div id="vence-text" class="vence-info"></div>

        <button id="btn-action" class="btn-primary" onclick="handleStream()" disabled>Espere...</button>
        <button class="btn-secondary" onclick="pasteUrl()">📋 PEGAR LINK DE TIENDA</button>

        <div id="link-container" class="link-box">
            <span style="display:block; font-size:0.7rem; color:#94a3b8; margin-bottom:5px;">LINK PARA EL CLIENTE:</span>
            <span id="link-url" class="url-text"></span>
            <button class="copy-btn" onclick="copyUrl()">COPIAR LINK</button>
        </div>

        <button class="btn-link" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>

</div>

<script>
    // ── CONFIG ──
    const API_URL = "TU_URL_DE_APPS_SCRIPT_AQUI"; // 👈 cambia esto
    const RECEPTOR_FILE = "receptor.html";
    const DEFAULT_TIENDA = "https://proyectosolaronline-ops.github.io/superOnline-Tienda/index.html?backend=https%3A%2F%2Fscript.google.com%2Fmacros%2Fs%2FAKfycbwQ_ESx2c-3DL83b_-ujjmvevSBGtwjPZ0e1wEHv3cnLbJOplTJDYUb_UiRVyTYXik%2Fexec&store=store_f2fcc889b992";

    let TIENDA_URL = DEFAULT_TIENDA;
    let peer, localStream, isLive = false;
    const connections = {};
    let sesion = null;

    // ── UI ──
    const btnAction = document.getElementById('btn-action');
    const statusDot  = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const linkContainer = document.getElementById('link-container');
    const linkUrl = document.getElementById('link-url');

    function mostrar(screen) {
        ['login','registro','panel'].forEach(s => 
            document.getElementById('screen-' + s).style.display = 'none');
        document.getElementById('screen-' + screen).style.display = 'block';
    }

    // Mostrar login al cargar
    mostrar('login');

    // ── LOGIN ──
    async function doLogin() {
        const usuario  = document.getElementById('login-user').value.trim();
        const password = document.getElementById('login-pass').value.trim();
        document.getElementById('login-error').textContent = '';

        if (!usuario || !password) {
            document.getElementById('login-error').textContent = 'Completa todos los campos.';
            return;
        }

        const res = await apiCall({ accion: 'login', usuario, password });
        if (!res.ok) {
            document.getElementById('login-error').textContent = res.msg;
            return;
        }

        sesion = res;
        TIENDA_URL = res.tienda_url || DEFAULT_TIENDA;
        iniciarPanel();
    }

    // ── REGISTRO ──
    async function doRegistro() {
        const usuario    = document.getElementById('reg-user').value.trim();
        const password   = document.getElementById('reg-pass').value.trim();
        const email      = document.getElementById('reg-email').value.trim();
        const tienda_url = document.getElementById('reg-url').value.trim() || DEFAULT_TIENDA;
        document.getElementById('reg-error').textContent = '';

        if (!usuario || !password || !email) {
            document.getElementById('reg-error').textContent = 'Usuario, contraseña y email son obligatorios.';
            return;
        }

        const res = await apiCall({ accion: 'registro', usuario, password, email, tienda_url });
        if (!res.ok) {
            document.getElementById('reg-error').textContent = res.msg;
            return;
        }

        alert('✅ ' + res.msg);
        mostrar('login');
    }

    // ── PANEL ──
    function iniciarPanel() {
        mostrar('panel');

        // Badge de plan
        const badge = document.getElementById('plan-badge');
        badge.textContent = sesion.plan.toUpperCase();
        badge.className = 'badge ' + sesion.plan;

        // Fecha vencimiento
        if (sesion.plan !== 'master' && sesion.plan !== 'full') {
            document.getElementById('vence-text').textContent = 
                `Licencia válida hasta: ${sesion.vencimiento}`;
        }

        // Iniciar PeerJS
        peer = new Peer({
            config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('open', (id) => {
            statusText.textContent = "SISTEMA LISTO";
            statusDot.className = "online";
            btnAction.disabled = false;
            btnAction.textContent = "Transmitir Tienda";

            const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf("/") + 1);
            const finalLink = `${baseUrl}${RECEPTOR_FILE}?host=${id}&url=${encodeURIComponent(TIENDA_URL)}`;
            linkUrl.textContent = finalLink;
            linkContainer.style.display = 'block';
        });

        peer.on('connection', (conn) => {
            connections[conn.peer] = conn;
            if (isLive && localStream) peer.call(conn.peer, localStream);
        });
    }

    // ── STREAM ──
    async function handleStream() {
        if (isLive) { location.reload(); return; }
        try {
            localStream = await navigator.mediaDevices.getDisplayMedia({
                video: { frameRate: { ideal: 15, max: 20 } }, audio: false
            });
            isLive = true;
            btnAction.textContent = "Detener Vivo";
            btnAction.classList.add('live');
            statusText.textContent = "EN VIVO AHORA";
            Object.keys(connections).forEach(pid => peer.call(pid, localStream));
            localStream.getVideoTracks()[0].onended = () => location.reload();
        } catch (err) {
            alert("Error: Selecciona la pestaña de la tienda para transmitir.");
        }
    }

    // ── PEGAR LINK (solo Full y Master) ──
    async function pasteUrl() {
        if (sesion.plan === 'prueba' || sesion.plan === 'junior') {
            alert("⚠️ Solo disponible en plan Full. Escríbenos para actualizar.");
            return;
        }
        try {
            const text = await navigator.clipboard.readText();
            if (text.startsWith("http")) {
                TIENDA_URL = text.trim();
                const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf("/") + 1);
                const finalLink = `${baseUrl}${RECEPTOR_FILE}?host=${peer.id}&url=${encodeURIComponent(TIENDA_URL)}`;
                linkUrl.textContent = finalLink;
                alert("✅ Link actualizado.");
            } else {
                alert("⚠️ El texto copiado no es un link válido.");
            }
        } catch (err) {
            alert("❌ Permite el acceso al portapapeles en el navegador.");
        }
    }

    function copyUrl() {
        navigator.clipboard.writeText(linkUrl.textContent);
        alert("¡Link copiado! Envíalo por WhatsApp.");
    }

    function cerrarSesion() {
        sesion = null;
        if (peer) peer.destroy();
        location.reload();
    }

    // ── API ──
    async function apiCall(body) {
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(body)
            });
            return await res.json();
        } catch (err) {
            return { ok: false, msg: 'Error de conexión con el servidor.' };
        }
    }
</script>
</body>
</html>
