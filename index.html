<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transmisor Owner — Live Shopping Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #a3e635; --bg: #0f172a; --purple: #a855f7; }
        * { box-sizing: border-box; }
        body {
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: white;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh;
        }
        .card {
            background: #1e293b; padding: 2.5rem; border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center;
            width: 90%; max-width: 420px; border: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 1.4rem; font-weight: 900; color: var(--primary); margin-bottom: 2px; }
        .subtitle { color: #64748b; font-size: 0.72rem; margin-bottom: 6px; letter-spacing: 1px; }
        .owner-tag {
            display: inline-block; background: rgba(168,85,247,0.15);
            border: 1px solid rgba(168,85,247,0.4); color: var(--purple);
            font-size: 0.65rem; font-weight: 800; letter-spacing: 1px;
            padding: 3px 12px; border-radius: 99px; margin-bottom: 22px;
        }
        .status-pill {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 16px; border-radius: 99px; background: rgba(0,0,0,0.3);
            margin-bottom: 20px; font-size: 0.72rem; font-weight: 700; letter-spacing: 1px;
        }
        #status-dot { width: 10px; height: 10px; background: #ef4444; border-radius: 50%; transition: 0.3s; }
        #status-dot.online { background: var(--primary); box-shadow: 0 0 10px var(--primary); }
        .btn-primary {
            background: var(--primary); color: #064e3b; border: none;
            padding: 1rem; border-radius: 14px; font-weight: 900;
            font-size: 1rem; cursor: pointer; width: 100%; text-transform: uppercase;
            transition: 0.3s; margin-top: 4px;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(163,230,53,0.3); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .btn-primary.live { background: #ef4444; color: white; }
        .btn-secondary {
            margin-top: 10px; width: 100%; padding: 0.75rem;
            background: transparent; border: 1px solid rgba(163,230,53,0.3);
            color: var(--primary); border-radius: 12px; font-size: 0.8rem;
            font-weight: 700; cursor: pointer; letter-spacing: 1px;
        }
        .btn-master {
            margin-top: 10px; width: 100%; padding: 0.85rem;
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            color: white; border: none; border-radius: 14px;
            font-weight: 900; font-size: 0.85rem; cursor: pointer;
            letter-spacing: 1px; box-shadow: 0 4px 16px rgba(168,85,247,0.35);
            transition: 0.3s;
        }
        .btn-master:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(168,85,247,0.5); }
        .link-box {
            margin-top: 20px; background: rgba(163,230,53,0.05);
            border: 1px solid rgba(163,230,53,0.2); border-radius: 12px; padding: 14px;
            display: none; text-align: left;
        }
        .url-text {
            font-family: monospace; font-size: 0.72rem; color: var(--primary);
            word-break: break-all; display: block; margin-bottom: 10px;
        }
        .copy-btn {
            background: var(--primary); color: #064e3b; border: none;
            padding: 5px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; cursor: pointer;
        }
        .divider {
            margin: 16px 0 10px;
            border: none; border-top: 1px solid rgba(255,255,255,0.07);
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">⚡ EASYLINK</div>
    <div class="subtitle">LIVE SHOPPING PRO</div>
    <div class="owner-tag">⚙️ MODO OWNER</div>

    <div class="status-pill">
        <div id="status-dot"></div>
        <span id="status-text">CONECTANDO...</span>
    </div>

    <button id="btn-action" class="btn-primary" onclick="handleStream()" disabled>Espere...</button>
    <button class="btn-secondary" onclick="pasteUrl()">📋 PEGAR LINK DE TIENDA</button>

    <hr class="divider">

    <button class="btn-master" onclick="window.open('panel-master.html','_blank')">
        ⚙️ ABRIR PANEL MASTER
    </button>

    <div id="link-container" class="link-box">
        <span style="display:block;font-size:0.7rem;color:#94a3b8;margin-bottom:5px;">LINK PARA EL CLIENTE:</span>
        <span id="link-url" class="url-text"></span>
        <button class="copy-btn" onclick="copyUrl()">COPIAR LINK</button>
    </div>
</div>

<script>
    const RECEPTOR_FILE = "receptor.html";
    const DEFAULT_TIENDA = "https://proyectosolaronline-ops.github.io/superOnline-Tienda/index.html?backend=https%3A%2F%2Fscript.google.com%2Fmacros%2Fs%2FAKfycbwQ_ESx2c-3DL83b_-ujjmvevSBGtwjPZ0e1wEHv3cnLbJOplTJDYUb_UiRVyTYXik%2Fexec&store=store_f2fcc889b992";

    let TIENDA_URL = DEFAULT_TIENDA;
    let peer, localStream, isLive = false;
    const connections = {};

    const btnAction     = document.getElementById('btn-action');
    const statusDot     = document.getElementById('status-dot');
    const statusText    = document.getElementById('status-text');
    const linkContainer = document.getElementById('link-container');
    const linkUrl       = document.getElementById('link-url');

    // ── Arrancar PeerJS directo, sin login ──
    peer = new Peer({
        config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
    });

    peer.on('open', (id) => {
        statusText.textContent = "SISTEMA LISTO";
        statusDot.className = "online";
        btnAction.disabled = false;
        btnAction.textContent = "Transmitir Tienda";

        const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf("/") + 1);
        const finalLink = `${baseUrl}${RECEPTOR_FILE}?host=${id}&url=${encodeURIComponent(TIENDA_URL)}`;
        linkUrl.textContent = finalLink;
        linkContainer.style.display = 'block';
    });

    peer.on('error', (err) => {
        statusText.textContent = "ERROR: " + err.type;
        console.error('[PeerJS]', err);
    });

    peer.on('connection', (conn) => {
        connections[conn.peer] = conn;
        if (isLive && localStream) peer.call(conn.peer, localStream);
    });

    // ── Stream ──
    async function handleStream() {
        if (isLive) { location.reload(); return; }
        try {
            localStream = await navigator.mediaDevices.getDisplayMedia({
                video: { frameRate: { ideal: 15, max: 20 } }, audio: false
            });
            isLive = true;
            btnAction.textContent = "Detener Vivo";
            btnAction.classList.add('live');
            statusText.textContent = "EN VIVO AHORA";
            Object.keys(connections).forEach(pid => peer.call(pid, localStream));
            localStream.getVideoTracks()[0].onended = () => location.reload();
        } catch (err) {
            alert("Error: Selecciona la pestaña de la tienda para transmitir.");
        }
    }

    // ── Pegar link de tienda ──
    async function pasteUrl() {
        try {
            const text = await navigator.clipboard.readText();
            if (text.startsWith("http")) {
                TIENDA_URL = text.trim();
                const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf("/") + 1);
                const finalLink = `${baseUrl}${RECEPTOR_FILE}?host=${peer.id}&url=${encodeURIComponent(TIENDA_URL)}`;
                linkUrl.textContent = finalLink;
                alert("✅ Link actualizado.");
            } else {
                alert("⚠️ El texto copiado no es un link válido.");
            }
        } catch (err) {
            alert("❌ Permite el acceso al portapapeles en el navegador.");
        }
    }

    function copyUrl() {
        navigator.clipboard.writeText(linkUrl.textContent);
        alert("¡Link copiado! Envíalo por WhatsApp.");
    }
</script>
</body>
</html>
