<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live Shopping - Easylink</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #a3e635; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
            font-family: -apple-system, system-ui, sans-serif;
        }

        /* TIENDA DE FONDO */
        #tienda-iframe {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            border: none; z-index: 1;
            background: #fff;
        }

        /* CONTENEDOR DE VIDEO: FLOTANTE Y MAXIMIZABLE */
        #video-container {
            position: absolute;
            top: 15px; right: 15px;
            width: 110px; height: 195px; /* Proporción móvil */
            border-radius: 12px;
            overflow: hidden;
            z-index: 1000; /* Siempre por encima del iframe */
            box-shadow: 0 8px 30px rgba(0,0,0,0.7);
            border: 2px solid var(--primary);
            background: #111;
            display: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        /* ESTADO MAXIMIZADO */
        #video-container.fullscreen {
            top: 0; right: 0;
            width: 100vw !important;
            height: 100vh !important;
            border-radius: 0;
            border: none;
        }
        
        video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* BOTÓN DE ACCESO */
        #btn-join {
            position: fixed; inset: 0; margin: auto;
            width: 140px; height: 140px; border-radius: 50%;
            background: var(--primary); border: none; color: #064e3b;
            font-weight: 800; z-index: 2000; 
            box-shadow: 0 0 40px var(--primary);
        }

        .tag {
            position: absolute; top: 8px; left: 8px;
            background: #ef4444; color: white;
            padding: 2px 8px; border-radius: 4px;
            font-size: 10px; font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="btn-join" onclick="initLive()">UNIRSE AL LIVE</button>

    <iframe id="tienda-iframe" src="about:blank"></iframe>

    <div id="video-container" onclick="toggleSize()">
        <div class="tag">VIVO</div>
        <video id="remote-video" autoplay playsinline muted></video>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const hostId = params.get('host');
    const tiendaUrl = params.get('url');

    // Cargar tienda de inmediato
    if(tiendaUrl) document.getElementById('tienda-iframe').src = tiendaUrl;

    const container = document.getElementById('video-container');
    const video = document.getElementById('remote-video');

    function toggleSize() {
        container.classList.toggle('fullscreen');
        // Al interactuar, quitamos el mute para que el audio funcione
        video.muted = false;
    }

    function initLive() {
        if (!hostId) return alert("ID de host no encontrado");
        
        document.getElementById('btn-join').style.display = 'none';
        container.style.display = 'block';

        const peer = new Peer({
            config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('open', () => {
            const conn = peer.connect(hostId);
            
            peer.on('call', (call) => {
                call.answer();
                call.on('stream', (stream) => {
                    video.srcObject = stream;
                    
                    // INTENTO DE PLAY FORZADO
                    video.play().catch(() => {
                        // Si el navegador bloquea, silenciamos y reintentamos
                        video.muted = true;
                        video.play();
                    });
                });
            });
        });
    }
</script>
</body>
</html>
